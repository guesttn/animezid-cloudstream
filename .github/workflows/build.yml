name: Build CS3

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build Plugins
        run: |
          git clone https://github.com/recloudstream/cloudstream-extensions-template.git template --depth 1
          cp -r AnimeZidProvider template/
          cd template
          chmod +x gradlew
          ./gradlew make
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Push to repo
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          folder: template/build/repos/
          branch: builds
          clean: true
